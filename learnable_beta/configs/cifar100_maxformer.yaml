epochs: 150
model: max_former
time_step: 4
layer: 4
dim: 384
mlp_ratio: 4
num_classes: 100

dataset: torch/cifar100
img_size: 32
mean:
    - 0.5071
    - 0.4867
    - 0.4408
std:
    - 0.2675
    - 0.2565
    - 0.2761
crop_pct: 1.0
